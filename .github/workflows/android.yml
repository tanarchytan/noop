# Compile-and-test verification for the Android app.
#
# Debug build only, with unit tests. There is intentionally no signing config,
# no keystore, no secrets, and no artifact publishing here: release APKs are
# built and signed by hand. A debug build falls back to the Android debug key
# automatically, so this job needs nothing from the repository owner to pass.
name: Android CI

on:
  pull_request:
    branches: [main, noop-tan]
    paths:
      - 'android/**'
      - '.github/workflows/android.yml'
  push:
    branches: [main, noop-tan]
    paths:
      - 'android/**'
      - '.github/workflows/android.yml'
  workflow_dispatch:

concurrency:
  group: android-${{ github.ref }}
  cancel-in-progress: true

jobs:
  build-and-test:
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: android
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up JDK 17
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: '17'

      - name: Validate Gradle wrapper
        uses: gradle/actions/wrapper-validation@v4

      - name: Set up Gradle
        uses: gradle/actions/setup-gradle@v4

      - name: Build debug APK
        run: ./gradlew assembleFullDebug

      - name: Run unit tests
        run: ./gradlew testFullDebugUnitTest
