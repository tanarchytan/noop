# Compile-and-test verification for the Android app.
#
# Debug build + unit tests. No signing/keystore/publishing (release APKs are built + signed by hand).
# The analytics/decode unit tests run through the Rust whoop-rs core via the whoop-ffi host lib (JNA), so
# the job checks out whoop-rs + its btleplug [patch] sibling and builds that lib. It needs one repo secret,
# WHOOP_RS_TOKEN = a read-only PAT for the private tanarchytan/whoop-rs (the debug APK build needs nothing).
name: Android CI

on:
  pull_request:
    branches: [main, noop-tan]
    paths:
      - 'android/**'
      - '.github/workflows/android.yml'
  push:
    branches: [main, noop-tan]
    paths:
      - 'android/**'
      - '.github/workflows/android.yml'
  workflow_dispatch:

concurrency:
  group: android-${{ github.ref }}
  cancel-in-progress: true

jobs:
  build-and-test:
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: android
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      # noop-tan is Android-only: the iOS/macOS/Swift app was removed with the platform split. Guard the
      # invariant so a stray Swift file (e.g. from a careless cross-platform cherry-pick) fails CI here
      # rather than silently re-introducing the tree the fork deliberately dropped.
      - name: Assert Android-only (no Swift files tracked)
        working-directory: ${{ github.workspace }}
        run: |
          n=$(git ls-files '*.swift' | wc -l)
          if [ "$n" -ne 0 ]; then
            echo "::error::noop-tan is Android-only but $n Swift file(s) are tracked:"
            git ls-files '*.swift'
            exit 1
          fi
          echo "Android-only invariant OK: 0 Swift files tracked."

      - name: Set up JDK 17
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: '17'

      - name: Validate Gradle wrapper
        uses: gradle/actions/wrapper-validation@v4

      - name: Set up Gradle
        uses: gradle/actions/setup-gradle@v4

      - name: Build debug APK
        run: ./gradlew assembleFullDebug

      # The analytics/decode unit tests exercise the real Rust core through the whoop-ffi host lib (JNA):
      # check out whoop-rs (private) + its btleplug [patch] sibling, build the host lib (buildRustHostDll),
      # and point the test JVM at it via WHOOP_RS_DIR.
      - name: Checkout whoop-rs (Rust core)
        uses: actions/checkout@v4
        with:
          repository: tanarchytan/whoop-rs
          token: ${{ secrets.WHOOP_RS_TOKEN }}
          path: .ci/whoop-rs
      - name: Checkout btleplug fork (whoop-rs [patch] sibling)
        uses: actions/checkout@v4
        with:
          repository: tanarchytan/btleplug
          ref: feat/winrtble-add-peripheral
          path: .ci/btleplug
      - name: Set up Rust
        uses: dtolnay/rust-toolchain@stable

      - name: Run unit tests
        env:
          WHOOP_RS_DIR: ${{ github.workspace }}/.ci/whoop-rs
        run: ./gradlew testFullDebugUnitTest
